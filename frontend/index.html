<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nexus — Secure authentication portal with modern UI. Login or create an account to access the dashboard.">
    <title>Nexus — Secure Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="http://127.0.0.1:8000/static/styles.css">
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-wrapper">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- ==================== AUTH VIEW ==================== -->
    <div id="auth-view" class="view active">
        <div class="auth-container">
            <!-- Branding -->
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <path d="M20 4L34 12V28L20 36L6 28V12L20 4Z" stroke="url(#brandGrad)" stroke-width="2.5" fill="none"/>
                        <path d="M20 10L28 15V25L20 30L12 25V15L20 10Z" fill="url(#brandGrad)" opacity="0.3"/>
                        <circle cx="20" cy="20" r="4" fill="url(#brandGrad)"/>
                        <defs>
                            <linearGradient id="brandGrad" x1="6" y1="4" x2="34" y2="36">
                                <stop stop-color="#818cf8"/>
                                <stop offset="1" stop-color="#c084fc"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="brand-name">Nexus</h1>
                <p class="brand-tagline">Secure Authentication Portal</p>
            </div>

            <!-- Tab Switcher -->
            <div class="tab-switcher">
                <button id="tab-login" class="tab active" onclick="switchTab('login')">Sign In</button>
                <button id="tab-register" class="tab" onclick="switchTab('register')">Create Account</button>
                <div class="tab-indicator"></div>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="login-username" placeholder="Username" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="login-password" placeholder="Password" required minlength="8" autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('login-password', this)" aria-label="Toggle password visibility">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" id="login-btn" class="btn-primary">
                    <span class="btn-text">Sign In</span>
                    <div class="btn-loader" style="display:none">
                        <div class="spinner"></div>
                    </div>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="reg-username" placeholder="Username" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <input type="email" id="reg-email" placeholder="Email Address" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                        <input type="tel" id="reg-mobile" placeholder="Mobile Number (10 digits)" required pattern="[0-9]{10}" maxlength="10" autocomplete="tel">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                        <input type="text" id="reg-address" placeholder="Address" required autocomplete="street-address">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="reg-password" placeholder="Password (min 8 characters)" required minlength="8" autocomplete="new-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('reg-password', this)" aria-label="Toggle password visibility">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="password-strength" id="password-strength">
                    <div class="strength-bars">
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                    </div>
                    <span class="strength-text"></span>
                </div>
                <button type="submit" id="register-btn" class="btn-primary">
                    <span class="btn-text">Create Account</span>
                    <div class="btn-loader" style="display:none">
                        <div class="spinner"></div>
                    </div>
                </button>
            </form>

            <!-- Toast Messages -->
            <div id="toast-container"></div>
        </div>
    </div>

    <!-- ==================== DASHBOARD VIEW ==================== -->
    <div id="dashboard-view" class="view">
        <nav class="dashboard-nav">
            <div class="nav-brand">
                <div class="nav-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <path d="M20 4L34 12V28L20 36L6 28V12L20 4Z" stroke="url(#navGrad)" stroke-width="2.5" fill="none"/>
                        <circle cx="20" cy="20" r="4" fill="url(#navGrad)"/>
                        <defs>
                            <linearGradient id="navGrad" x1="6" y1="4" x2="34" y2="36">
                                <stop stop-color="#818cf8"/>
                                <stop offset="1" stop-color="#c084fc"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="nav-title">Nexus</span>
            </div>
            <div class="nav-actions">
                <div class="user-badge" id="nav-user-badge">
                    <div class="avatar" id="nav-avatar"></div>
                    <span id="nav-username"></span>
                </div>
                <button id="logout-btn" class="btn-logout" onclick="handleLogout()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
        </nav>

        <main class="dashboard-content">
            <div class="welcome-section">
                <div class="welcome-text">
                    <h2>Welcome back, <span id="dash-username" class="gradient-text"></span></h2>
                    <p class="welcome-sub">Here's your account overview</p>
                </div>
                <div class="welcome-time" id="dash-time"></div>
            </div>

            <div class="dashboard-grid">
                <!-- Profile Card -->
                <div class="dash-card profile-card">
                    <div class="card-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <h3>Profile</h3>
                    </div>
                    <div class="profile-details">
                        <div class="profile-avatar-lg" id="dash-avatar-lg"></div>
                        <div class="detail-row">
                            <span class="detail-label">Username</span>
                            <span class="detail-value" id="detail-username"></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Email</span>
                            <span class="detail-value" id="detail-email"></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Mobile</span>
                            <span class="detail-value" id="detail-mobile"></span>
                        </div>
                    </div>
                </div>

                <!-- Security Card -->
                <div class="dash-card security-card">
                    <div class="card-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                        <h3>Security Status</h3>
                    </div>
                    <div class="security-status">
                        <div class="status-item">
                            <div class="status-dot active"></div>
                            <span>Authentication</span>
                            <span class="status-badge success">Active</span>
                        </div>
                        <div class="status-item">
                            <div class="status-dot active"></div>
                            <span>Token</span>
                            <span class="status-badge success">Valid</span>
                        </div>
                        <div class="status-item">
                            <div class="status-dot active"></div>
                            <span>Session</span>
                            <span class="status-badge success">Secure</span>
                        </div>
                    </div>
                </div>

                <!-- Activity Card -->
                <div class="dash-card activity-card">
                    <div class="card-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                        </svg>
                        <h3>Session Info</h3>
                    </div>
                    <div class="session-info">
                        <div class="info-item">
                            <span class="info-label">Login Time</span>
                            <span class="info-value" id="session-time"></span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Token Expires</span>
                            <span class="info-value" id="session-expiry"></span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">IP Address</span>
                            <span class="info-value">Protected</span>
                        </div>
                        <div class="info-item session-timer">
                            <span class="info-label">Session Expires In</span>
                            <span class="info-value" id="session-countdown">30:00</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="http://127.0.0.1:8000/static/app.js"></script>
</body>
</html>
